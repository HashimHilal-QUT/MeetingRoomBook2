name: Meeting Room Booking CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── JOB 1: Run backend tests ───────────────────────────────────────────────
  test:
    name: Backend Tests
    runs-on: self-hosted
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Run backend tests
        working-directory: ./backend
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ vars.PORT }}
          NODE_ENV: ${{ vars.NODE_ENV }}
        run: npm test

  # ─── JOB 2: Build frontend ──────────────────────────────────────────────────
  build:
    name: Frontend Build
    runs-on: self-hosted
    environment: development
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        run: npm run build

  # ─── JOB 3: Deploy to Azure VM (only on push to main) ───────────────────────
  deploy:
    name: Deploy Application
    runs-on: self-hosted
    environment: production
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Write backend .env from secret
        run: |
          echo "${{ secrets.PROD }}" > ./backend/.env

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend with production URL
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: ${{ vars.REACT_APP_API_URL }}
        run: |
          rm -rf ./build
          npm run build

      - name: Restart backend with PM2
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
          PORT: ${{ vars.PORT }}
        run: |
          cd ./backend
          pm2 describe meetingroom-api > /dev/null 2>&1 \
            && pm2 restart meetingroom-api \
            || pm2 start server.js --name meetingroom-api
          pm2 save

      - name: Reload Nginx
        run: sudo systemctl reload nginx